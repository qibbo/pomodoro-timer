<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1f1b17">
<title>番茄钟 - Pomodoro Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     设计主题：陶艺工坊 (Pottery Studio)
     温暖、有机、手工质感 — 赤陶色调 + 纹理背景 + 优雅衬线数字
     ═══════════════════════════════════════════ */

  :root {
    --bg: #1f1b17;
    --surface: #27231e;
    --card: #2f2a24;
    --card-hover: #3a352e;
    --accent: #d4785c;
    --accent-dim: rgba(212, 120, 92, 0.12);
    --accent-glow: rgba(212, 120, 92, 0.30);
    --text: #ede6db;
    --text-dim: #b8af9f;
    --muted: #8c8272;
    --border: rgba(255,255,255,0.06);
    --ring-track: #2f2a24;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --kbd-bg: #2f2a24;
  }

  html[data-theme="light"] {
    --bg: #f6f1e9;
    --surface: #ede5d8;
    --card: #ffffff;
    --card-hover: #f2ece2;
    --accent: #c06b4a;
    --accent-dim: rgba(192, 107, 74, 0.08);
    --accent-glow: rgba(192, 107, 74, 0.18);
    --text: #2d2418;
    --text-dim: #6b5e4e;
    --muted: #8c7b6b;
    --border: rgba(0,0,0,0.06);
    --ring-track: #e8dfd2;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
    --kbd-bg: #ede5d8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.4s, color 0.4s;
  }

  /* 噪点纹理叠加层 — 营造纸张/陶瓷的有机质感 */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
    opacity: 0.035;
    pointer-events: none;
    z-index: 1000;
  }

  /* 暗色模式下噪点稍亮，浅色模式下噪点稍暗 */
  html[data-theme="light"] body::after {
    opacity: 0.025;
    filter: invert(1);
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
    padding: 2rem;
    max-width: 420px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* ═══════════ 顶部：标题 + 主题切换 ═══════════ */
  .header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    width: 100%;
  }

  .header h1 {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .theme-toggle {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }

  .theme-toggle:hover {
    background: var(--card-hover);
    transform: scale(1.05);
  }
  .theme-toggle:active { transform: scale(0.95); }

  /* ═══════════ 计时器圆环 — 视觉主角 ═══════════ */
  .timer-wrapper {
    position: relative;
    width: 260px;
    height: 260px;
  }

  /* 圆环外发光 — 计时中呼吸效果 */
  .timer-ring-glow {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }

  .timer-wrapper.running .timer-ring-glow {
    opacity: 1;
    animation: glow-breathe 3s ease-in-out infinite;
  }

  @keyframes glow-breathe {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }

  .timer-ring {
    transform: rotate(-90deg);
    width: 260px;
    height: 260px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 12px var(--accent-glow));
    transition: filter 0.5s;
  }

  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 10;
  }

  .ring-progress {
    fill: none;
    stroke: var(--progress, #d4785c);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.35s linear, stroke 0.4s;
  }

  .time-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Nunito', 'Calibri', 'Segoe UI', system-ui, sans-serif;
    font-size: 4.6rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    transition: color 0.4s;
    z-index: 2;
  }

  /* 计时中数字变为强调色 */
  .timer-wrapper.running .time-display {
    color: var(--accent);
  }

  /* ═══════════ 模式选择器 ═══════════ */
  .mode-selector {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .mode-btn {
    flex: 1;
    padding: 10px 6px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--card);
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: var(--shadow-sm);
    position: relative;
  }

  .mode-btn:hover {
    background: var(--card-hover);
    color: var(--text);
  }

  .mode-btn:active { transform: scale(0.97); }

  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 2px 12px var(--accent-glow);
  }

  /* ═══════════ 时长调节器 ═══════════ */
  .duration-row {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .duration-btn {
    width: 42px;
    height: 42px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .duration-btn:hover {
    background: var(--card-hover);
    color: var(--text);
  }
  .duration-btn:active { transform: scale(0.9); }

  .duration-input {
    width: 52px;
    padding: 10px 4px;
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-family: inherit;
    outline: none;
    -moz-appearance: textfield;
  }

  .duration-input::-webkit-outer-spin-button,
  .duration-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .duration-label {
    padding: 0 14px;
    font-size: 0.85rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* ═══════════ 番茄计数 ═══════════ */
  .session-info {
    font-size: 0.85rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .session-dots {
    display: flex;
    gap: 4px;
  }

  .session-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ring-track);
    transition: all 0.3s;
  }

  .session-dot.done {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .session-count-text {
    font-weight: 600;
    color: var(--text);
  }

  /* ═══════════ 按钮 ═══════════ */
  .controls {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .btn {
    padding: 14px 24px;
    border: none;
    border-radius: 16px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-primary {
    flex: 2;
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  .btn-primary:hover {
    filter: brightness(1.08);
    box-shadow: 0 6px 24px var(--accent-glow);
    transform: translateY(-1px);
  }
  .btn-primary:active {
    transform: scale(0.97);
    filter: brightness(0.95);
  }

  .btn-secondary {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--card);
    color: var(--text);
    border-color: transparent;
  }
  .btn-secondary:active { transform: scale(0.97); }

  /* ═══════════ 键盘快捷键提示 ═══════════ */
  .footer {
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.7;
  }

  .footer kbd {
    background: var(--kbd-bg);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-family: inherit;
  }

  /* ═══════════ 计时结束闪烁 ═══════════ */
  .flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 500;
    opacity: 0;
    transition: opacity 0.15s;
  }

  /* ═══════════ 响应式：移动端 ═══════════ */
  @media (max-width: 480px) {
    .container {
      gap: 1.2rem;
      padding: 1.2rem;
    }

    .timer-wrapper {
      width: 220px;
      height: 220px;
    }

    .timer-ring {
      width: 220px;
      height: 220px;
    }

    .timer-ring-glow {
      inset: -10px;
    }

    .time-display {
      font-size: 3.8rem;
    }

    .mode-btn {
      font-size: 0.75rem;
      padding: 8px 4px;
      border-radius: 12px;
    }

    .header h1 {
      font-size: 0.85rem;
    }
  }
</style>
</head>
<body>

<div class="container">
  <!-- 顶部 -->
  <div class="header">
    <h1>番茄钟</h1>
    <button class="theme-toggle" id="themeToggle" title="切换深浅主题">☀️</button>
  </div>

  <!-- 计时圆环 -->
  <div class="timer-wrapper" id="timerWrapper">
    <div class="timer-ring-glow"></div>
    <svg class="timer-ring" viewBox="0 0 240 240">
      <circle class="ring-track" cx="120" cy="120" r="112"/>
      <circle class="ring-progress" cx="120" cy="120" r="112"
              stroke-dasharray="703.72" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display" id="timeDisplay">25:00</div>
  </div>

  <!-- 模式选择 -->
  <div class="mode-selector">
    <button class="mode-btn active" data-mode="focus">专注 25min</button>
    <button class="mode-btn" data-mode="short">短休 5min</button>
    <button class="mode-btn" data-mode="long">长休 15min</button>
  </div>

  <!-- 时长调节 -->
  <div class="duration-row">
    <button class="duration-btn" id="durationMinus" aria-label="减少一分钟">−</button>
    <input class="duration-input" id="durationInput" type="number" min="1" max="120" value="25" inputmode="numeric">
    <span class="duration-label">分钟</span>
    <button class="duration-btn" id="durationPlus" aria-label="增加一分钟">+</button>
  </div>

  <!-- 番茄计数 -->
  <div class="session-info">
    已完成 <span class="session-dots" id="sessionDots"></span>
    <span class="session-count-text" id="sessionCount">0</span> 个番茄
  </div>

  <!-- 操作按钮 -->
  <div class="controls">
    <button class="btn btn-primary" id="startBtn">开始</button>
    <button class="btn btn-secondary" id="resetBtn">重置</button>
  </div>

  <!-- 快捷键 -->
  <div class="footer">
    按 <kbd>Space</kbd> 开始/暂停 &nbsp; <kbd>R</kbd> 重置 &nbsp; <kbd>1-3</kbd> 切换模式
  </div>
</div>

<div class="flash-overlay" id="flashOverlay"></div>

<script>
  const MODES = {
    focus: { label: '专注', minutes: 25, color: '#d4785c' },
    short: { label: '短休', minutes: 5,  color: '#8b9e7b' },
    long:  { label: '长休', minutes: 15, color: '#b8956a' }
  };

  const DURATION_DEFAULTS = {
    focus: MODES.focus.minutes,
    short: MODES.short.minutes,
    long: MODES.long.minutes
  };

  const CIRCUMFERENCE = 2 * Math.PI * 112;

  try {
    const saved = JSON.parse(localStorage.getItem('pomodoro-durations'));
    if (saved && typeof saved.focus === 'number') {
      MODES.focus.minutes = saved.focus;
      MODES.short.minutes = saved.short;
      MODES.long.minutes = saved.long;
    }
  } catch (e) { /* ignore */ }

  let currentMode = 'focus';
  let totalSeconds = MODES.focus.minutes * 60;
  let remaining = totalSeconds;
  let timerId = null;
  let sessionCount = 0;
let audioCtx = null;

  const timerWrapper = document.getElementById('timerWrapper');
  const timeDisplay = document.getElementById('timeDisplay');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const sessionCountEl = document.getElementById('sessionCount');
  const sessionDots = document.getElementById('sessionDots');
  const ringProgress = document.querySelector('.ring-progress');
  const modeBtns = document.querySelectorAll('.mode-btn');
  const durationInput = document.getElementById('durationInput');
  const durationMinus = document.getElementById('durationMinus');
  const durationPlus = document.getElementById('durationPlus');
  const themeToggle = document.getElementById('themeToggle');
  const flashOverlay = document.getElementById('flashOverlay');

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function saveDurations() {
    try {
      localStorage.setItem('pomodoro-durations', JSON.stringify({
        focus: MODES.focus.minutes,
        short: MODES.short.minutes,
        long: MODES.long.minutes
      }));
    } catch (e) { /* ignore */ }
  }

  function updateModeLabels() {
    modeBtns.forEach(b => {
      const m = MODES[b.dataset.mode];
      b.textContent = `${m.label} ${m.minutes}min`;
    });
  }

  function updateDurationInput() {
    durationInput.value = MODES[currentMode].minutes;
  }

  function updateSessionDots() {
    const n = sessionCount % 4;
    let html = '';
    for (let i = 0; i < 4; i++) {
      html += `<span class="session-dot${i < n ? ' done' : ''}"></span>`;
    }
    sessionDots.innerHTML = html;
  }

  function applyDuration() {
    const v = parseInt(durationInput.value, 10);
    if (isNaN(v) || v < 1) {
      durationInput.value = MODES[currentMode].minutes;
      return;
    }
    const clamped = Math.min(v, 120);
    if (clamped === MODES[currentMode].minutes) return;
    MODES[currentMode].minutes = clamped;
    durationInput.value = clamped;
    updateModeLabels();
    saveDurations();
    totalSeconds = clamped * 60;
    remaining = totalSeconds;
    updateDisplay();
  }

  function adjustDuration(delta) {
    const mode = MODES[currentMode];
    const next = mode.minutes + delta;
    if (next < 1 || next > 120) return;
    if (next === mode.minutes) return;
    mode.minutes = next;
    updateModeLabels();
    updateDurationInput();
    saveDurations();
    totalSeconds = next * 60;
    remaining = totalSeconds;
    updateDisplay();
  }

  function updateDisplay() {
    const text = formatTime(remaining);
    timeDisplay.textContent = text;
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / totalSeconds);
    document.title = text + ' - 番茄钟';
  }

  function setMode(mode) {
    currentMode = mode;
    totalSeconds = MODES[mode].minutes * 60;
    remaining = totalSeconds;
    document.documentElement.style.setProperty('--progress', MODES[mode].color);

    modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    updateDurationInput();
    updateDisplay();
  }

  function ensureAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    if (Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }

  function startTimer() {
    if (timerId) return;
    ensureAudioContext();
    timerWrapper.classList.add('running');
    timerId = setInterval(() => {
      remaining--;
      updateDisplay();
      if (remaining <= 0) {
        clearInterval(timerId);
        timerId = null;
        timerWrapper.classList.remove('running');
        onTimerEnd();
      }
    }, 1000);
    startBtn.textContent = '暂停';
  }

  function pauseTimer() {
    clearInterval(timerId);
    timerId = null;
    timerWrapper.classList.remove('running');
    startBtn.textContent = '开始';
  }

  function resetTimer() {
    pauseTimer();
    MODES.focus.minutes = DURATION_DEFAULTS.focus;
    MODES.short.minutes = DURATION_DEFAULTS.short;
    MODES.long.minutes = DURATION_DEFAULTS.long;
    totalSeconds = MODES[currentMode].minutes * 60;
    remaining = totalSeconds;
    try { localStorage.removeItem('pomodoro-durations'); } catch (e) { /* ignore */ }
    updateModeLabels();
    updateDurationInput();
    updateDisplay();
  }

  function onTimerEnd() {
    notify();
    if (currentMode === 'focus') {
      sessionCount++;
      sessionCountEl.textContent = sessionCount;
      updateSessionDots();
      setMode(sessionCount % 4 === 0 ? 'long' : 'short');
    } else {
      setMode('focus');
    }
    startTimer();
  }

  function notify() {
    /* 屏幕闪烁 */
    flashOverlay.style.background = MODES[currentMode === 'focus' ? 'short' : 'focus'].color;
    flashOverlay.style.opacity = '0.25';
    setTimeout(() => {
      flashOverlay.style.opacity = '0';
    }, 600);

    if (Notification.permission === 'granted') {
      const label = currentMode === 'focus' ? '休息一下！' : '开始专注！';
      new Notification('番茄钟', { body: label });
    }

    /* 3 声短促提示音 × 2 轮 */
    if (audioCtx && audioCtx.state === 'running') {
      const now = audioCtx.currentTime;
      for (let i = 0; i < 6; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        const t = now + i * 0.25 + (i >= 3 ? 0.25 : 0);
        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        osc.start(t);
        osc.stop(t + 0.15);
      }
    }
  }


  startBtn.addEventListener('click', () => {
    if (timerId) pauseTimer();
    else startTimer();
  });

  resetBtn.addEventListener('click', resetTimer);

  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      pauseTimer();
      setMode(btn.dataset.mode);
    });
  });

  durationMinus.addEventListener('click', () => adjustDuration(-1));
  durationPlus.addEventListener('click', () => adjustDuration(1));
  durationInput.addEventListener('change', applyDuration);
  durationInput.addEventListener('blur', applyDuration);

  const savedTheme = localStorage.getItem('pomodoro-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeButton();

  function updateThemeButton() {
    themeToggle.textContent =
      document.documentElement.getAttribute('data-theme') === 'light' ? '🌙' : '☀️';
  }

  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('pomodoro-theme', next);
    updateThemeButton();
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
      case ' ': case 'Spacebar':
        e.preventDefault();
        if (timerId) pauseTimer(); else startTimer();
        break;
      case 'r': case 'R':
        resetTimer();
        break;
      case '1': pauseTimer(); setMode('focus'); break;
      case '2': pauseTimer(); setMode('short'); break;
      case '3': pauseTimer(); setMode('long'); break;
    }
  });

  updateModeLabels();
  updateDurationInput();
  updateSessionDots();
  updateDisplay();
</script>
</body>
</html>
